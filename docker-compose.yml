version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: servicehub_postgres
    environment:
      POSTGRES_DB: servicehub
      POSTGRES_USER: servicehub_user
      POSTGRES_PASSWORD: servicehub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - servicehub_network

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicehub_app
    working_dir: /var/www
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=servicehub
      - DB_USERNAME=servicehub_user
      - DB_PASSWORD=servicehub_password
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
    networks:
      - servicehub_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: servicehub_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - servicehub_network

volumes:
  postgres_data:

networks:
  servicehub_network:
    driver: bridge